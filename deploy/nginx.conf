# City Agent RISE — Nginx reverse proxy (alternative to Caddy).
#
#   /api/*  -> api  (FastAPI :8000) — the trailing slash on proxy_pass STRIPS the /api
#              prefix, so /api/health reaches the API as /health (the app has no /api/* routes).
#   /*      -> web  (SvelteKit adapter-node :3000)
#
# Used by docker-compose.nginx.yml. Service names `api` and `web` resolve on the compose
# network. If you run Nginx on the host instead, replace api:8000 -> 127.0.0.1:<api port>
# and web:3000 -> 127.0.0.1:<web port> (and publish those ports in the compose file).

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;          # allow data-file uploads

    # ── API (strip /api) ──
    location /api/ {
        proxy_pass http://api:8000/;   # <-- trailing slash is REQUIRED (strips /api)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;           # SSE (Run Experiment live log / streaming)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Web UI ──
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
