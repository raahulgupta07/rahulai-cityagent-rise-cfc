# CFC Forecaster — dev stack. api reads parquet (mounted), web proxies /api -> api.
# Operational store = SQLite (deps/db.py); no Postgres. Single api process.
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app/api
    environment:
      APP_ENV: dev
      AUTH_DISABLED: "1"
      APP_DB_PATH: /app/appstore/app.db
    volumes:
      - ./api:/app/api          # live code (reload)
      - ./src:/app/src          # engine, importable
      - ./data:/app/data        # parquet forecast data + writable outputs
      - ./models:/app/models
      - ./reports:/app/reports
      - appstore:/app/appstore  # SQLite operational DB
    ports: ["8000:8000"]

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment: { API_PROXY: "http://api:8000" }
    volumes: ["./web:/app"]
    ports: ["5173:5173"]
    depends_on: [api]

volumes: { appstore: {} }
