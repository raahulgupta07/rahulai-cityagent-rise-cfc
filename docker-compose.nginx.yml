# City Agent RISE — production stack fronted by NGINX (instead of Caddy).
#
#   docker compose -f docker-compose.nginx.yml --env-file .env.prod up -d --build
#
# Nginx publishes ${HTTP_PORT:-80} and reverse-proxies:
#   /api/* -> api (strips /api)   ·   /* -> web
# api and web are NOT published to the host — Nginx reaches them by service name on the
# compose network (do NOT curl the api directly; go through Nginx on ${HTTP_PORT}).
#
# api runs ONE worker on purpose (in-process heavy-lock + job registry). Scale up, not out.

services:

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on: [api, web]
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    env_file: .env.prod
    command: >
      gunicorn main:app
        --worker-class uvicorn.workers.UvicornWorker
        --workers 1
        --bind 0.0.0.0:8000
        --timeout 600
        --access-logfile -
    working_dir: /app/api
    environment:
      APP_DB_PATH: /app/appstore/app.db
    volumes:
      - appstore:/app/appstore
      - ./data:/app/data
      - ./reports:/app/reports
      - ./models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      PORT: 3000
    depends_on: [api]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s

volumes:
  appstore:
