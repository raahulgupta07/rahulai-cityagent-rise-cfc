# City Agent RISE — SINGLE-CONTAINER stack (recommended, simplest).
#
#   docker compose -f docker-compose.single.yml --env-file .env.prod up -d --build
#   → open http://<server-ip>:${HTTP_PORT}
#
# One container serves the UI (/) and the API (/api) on one port. No reverse proxy, no
# /api-strip config, nothing to misconfigure. For HTTPS, put Caddy/Nginx in front and
# forward everything to this container (or use the caddy/nginx compose variants).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    restart: always
    env_file: .env.prod
    ports:
      - "${HTTP_PORT:-80}:8000"
    environment:
      APP_DB_PATH: /app/appstore/app.db
    volumes:
      - appstore:/app/appstore   # SQLite (users/audit/jobs)
      - ./data:/app/data         # parquet + snapshot cache (optional; Fabric works without)
      - ./reports:/app/reports
      - ./models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 30s

volumes:
  appstore:
