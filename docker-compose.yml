# City Agent RISE — DEFAULT stack = SINGLE container (UI + API on one port).
#
#   docker compose --env-file .env.prod up -d --build      # plain command just works
#   # or the helper:  bash deploy/up.sh
#
# One container serves the UI (/) and the API (/api) on ${HTTP_PORT}. No reverse proxy,
# no /api-strip, no separate web container — nothing to misconfigure.
#
# Other stacks (only if you specifically need them):
#   docker-compose.dev.yml     local dev (hot reload, vite :5173 + uvicorn :8000)
#   docker-compose.nginx.yml   multi-container behind Nginx
#   docker-compose.prod.yml    multi-container behind Caddy (auto-TLS)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    restart: always
    env_file: .env.prod
    ports:
      - "${HTTP_PORT:-80}:8000"
    environment:
      APP_DB_PATH: /app/appstore/app.db
    volumes:
      - appstore:/app/appstore   # SQLite (users/audit/jobs)
      - ./data:/app/data         # parquet + snapshot cache (optional; Fabric works without)
      - ./reports:/app/reports
      - ./models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 30s

volumes:
  appstore:
